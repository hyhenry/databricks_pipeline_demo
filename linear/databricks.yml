# This is a Databricks asset bundle definition for linear.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: linear
  uuid: b901769c-e756-4ed2-b733-f0b88ae7f755

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to write to
  source_catalog:
    description: The catalog to reference from
  schema:
    description: The schema to refence
  env:
    description: Environment name (dev/prod)

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-00c1f96f-10e2.cloud.databricks.com
    variables:
      catalog: silver_dev
      source_catalog: bronze_dev
      schema: linear
      env: development
  prod:
    mode: production
    workspace:
      host: https://dbc-00c1f96f-10e2.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/hfhy01@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/data_engineering/${bundle.name}/${bundle.target}
    variables:
      catalog: silver
      source_catalog: bronze
      schema: linear
      env: production
    permissions:
      - user_name: hfhy01@gmail.com
        level: CAN_MANAGE
