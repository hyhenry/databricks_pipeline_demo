# The main pipeline for linear

resources:
  pipelines:
    linear_etl:
      name: linear_pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      configuration:
        catalog: ${var.catalog}
        source_catalog: ${var.source_catalog}
      root_path: "../src/silver"

      libraries:
        - glob:
            include: ../src/silver/**