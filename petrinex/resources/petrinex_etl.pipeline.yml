# The main pipeline for petrinex

resources:
  pipelines:
    petrinex_etl:
      name: petrinex_pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      configuration:
        source_catalog: ${var.source_catalog}
      root_path: "../src/silver"



      libraries:
        - glob:
            include: ../src/silver/**

      # environment:
      #   dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          #- --editable ${workspace.file_path}
