# The main pipeline for petrinex

resources:
  pipelines:
    petrinex_etl:
      name: petrinex_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      environment: ${var.env}
      serverless: true
      root_path: "../src/petrinex_etl"

      libraries:
        - glob:
            include: ../src/petrinex_etl/transformations/**

      # environment:
      #   dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          #- --editable ${workspace.file_path}
