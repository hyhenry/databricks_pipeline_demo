# The main pipeline for petrinex

resources:
  pipelines:
    petrinex_etl:
      name: petrinex_pipeline
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      configuration:
        catalog: ${var.catalog}
        source_catalog: ${var.source_catalog}
      root_path: "../src/silver"



      libraries:
        - glob:
            include: ../src/silver/**