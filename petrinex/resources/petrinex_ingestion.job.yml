# A sample job for petrinex.

resources:
  jobs:
    petrinex_injestion:
      name: daily_petrinex_job

      trigger:
        # Run this job every day, exactly one day from the last run; see https://docs.databricks.com/api/workspace/jobs/create#trigger
        periodic:
          interval: 1
          unit: DAYS

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: env
          default: ${var.env}
        - name: source_catalog
          default: ${var.source_catalog}

      tasks:

        - task_key: petrinex_bronze_load
          notebook_task:
            notebook_path: ../src/bronze/petrinex_ingest_data.py
          # new_cluster:
          #   spark_version: 15.4.x-scala2.12
          #   node_type_id: i3.xlarge
          #   num_workers: 2

        - task_key: petrinex_silver_load
          depends_on:
            - task_key: petrinex_bronze_load
          pipeline_task:
            pipeline_id: ${resources.pipelines.petrinex_etl.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
